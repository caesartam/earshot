<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earshot — melody ear trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
     <header class="header">
        <h1>Earshot</h1>
        <p class="tagline">Train your ear. Hear a melody, play it back.</p>
     </header>

     <section class="stats">
        <div class="stat">
           <span class="stat-label">Round</span>
           <span class="stat-value" id="round">1</span>
        </div>
        <div class="stat">
           <span class="stat-label">Score</span>
            <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat"> 
           <span class="stat-label">Notes</span>
            <span class="stat-value" id="length">3</span>
        </div>
     </section>


     <section class="status-bar">
        <p id="status">Click "Play Melody" to begin.</p>
      </section>


      <div class="controls">
        <button id="playBtn" class="btn btn-primary">
          Play melody
        </button>
      </div>

      <section class="answer-track" id="answerTrack" aria-label="Your answer so far"></section>

      <section class="piano" id="piano" aria-label="Click keys to answer"></section>

      <div class="controls controls-bottom">
        <button id="submitBtn" class="btn btn-primary" disabled>Submit answer</button>
        <button id="resetBtn" class="btn btn-secondary">Reset</button>
      </div>

      <footer class="footer">
        <p>created by @caesar</p> 
      </footer>
  </main>
</body>
</html>
